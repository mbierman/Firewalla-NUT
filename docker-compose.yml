version: '3.8'
services:
  nut-client:
    build: .
    image: nut-local:latest
    container_name: nut-client
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    privileged: true
    pid: "host"
    network_mode: host
    volumes:
      - ./upsmon.conf:/etc/nut/upsmon.conf:ro
